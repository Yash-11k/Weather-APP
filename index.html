<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weather App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">

  <!-- Search -->
  <div class="search">
    <input type="text" id="searchBox" placeholder="Enter city...">
    <button onclick="getWeather()">Search</button>
  </div>

  <!-- Weather Info -->
  <div class="weather-card">
    <h2 id="city">City</h2>
    <h1 id="temp">--°C</h1>
    <p id="condition">Condition</p>

    <div class="details">
      <div>
        <p>Humidity</p>
        <h3 id="humidity">--</h3>
      </div>
      <div>
        <p>Wind</p>
        <h3 id="wind">--</h3>
      </div>
    </div>
  </div>

</div>

<!-- JS LINK -->
<script src="script.js"></script>

</body>
</html>
